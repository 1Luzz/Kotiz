databases:
  - name: kotiz-db
    plan: free
    databaseName: kotiz
    user: kotiz

services:
  # API Backend (Fastify + Prisma)
  - type: web
    name: kotiz-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /auth/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kotiz-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SERVE_FRONTEND
        value: "false"

  # PWA Frontend (Static Site)
  - type: web
    name: kotiz-pwa
    runtime: static
    rootDir: app
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
